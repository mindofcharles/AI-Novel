# ==========================================
# Agent Role-to-Model Assignment Map
# ==========================================
models:
  # Key references from config/ai_model_config.yaml
  default_model: "local-AI"
  architect_model: "local-AI"
  planner_model: "local-AI"
  writer_model: "local-AI"
  critic_model: "local-AI"
  scanner_model: "local-AI"
  embedding_model: "emb"

# ==========================================
# Paths / Project Configuration
# ==========================================
project:
  db_path: "novel/process/facts/facts.db"
  faiss_index_path: "novel/process/facts/vector_index.faiss"
  novel_title: "Untitled Novel"
  output_dir: "novel/main_text"
  frame_dir: "novel/frame"
  process_dir: "novel/process"
  # Language: "Chinese" or "English"
  language: "English"

# ==========================================
# Retrieval / Constraint Controls
# ==========================================
retrieval:
  tier_1_relevance_threshold: 0.9
  tier_3_search_limit: 5

# ==========================================
# Workflow Controls
# ==========================================
workflow:
  world_discussion_rounds: 1
  plot_discussion_rounds: 1
  detailed_plot_discussion_rounds: 1
  chapter_guide_discussion_rounds: 1
  chapter_revision_rounds: 1
  chapter_text_discussion_rounds: 1
  auto_generation_max_retries: 3
  language_rewrite_max_attempts: 2
  conflict_discussion_rounds: 2

  # Blocking conflict governance mode:
  # - "auto_keep_existing": auto-resolve BLOCKING conflicts by keep_existing before gating.
  # - "manual_block": never auto-resolve BLOCKING conflicts; fail fast until resolved manually.
  blocking_conflict_mode: "manual_block"

# ==========================================
# Experimental AI Autonomy & Delegation
# ==========================================
autonomy:
  enable_autonomy_suite: false          # Master toggle to enable/disable entire autonomy suite
  enable_autonomous_queries: false      # Global toggle for tool use loops
  enable_dynamic_delegation: false      # Global toggle for spawning subagents
  max_delegation_depth: 2               # Depth 0 (root) -> Depth 1 (child) -> Depth 2 (grandchild)
  max_subagent_team_size: 3             # Max sibling team size
  subagent_discussion_rounds: 1         # Discussion rounds inside subagent panels
  large_file_threshold_kb: 50           # Files larger than this return outline warning
  max_chunk_lines: 100                  # Paginated lines per read request
  enable_budget_monitoring: false       # Toggle to enable/disable supervisor budget monitoring
  total_token_budget_usd: 1.00          # Supervisor termination budget cap per session
